<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Release Synchronizer</title>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
    header { background: #0f172a; color: white; padding: 12px 18px; }
    header nav a { color: #cbd5e1; margin-right: 14px; text-decoration: none; }
    main { padding: 18px; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
    .messages { margin-bottom: 14px; }
    .message { background: #ecfeff; border: 1px solid #67e8f9; border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { border-bottom: 1px solid #e2e8f0; text-align: left; padding: 8px; }
    th { background: #f8fafc; }
  </style>
</head>
<body>
  <header>
    <strong>Release Synchronizer</strong>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/release-plans/">Release Plans</a>
      <a href="/approvals/">Approvals</a>
      <a href="/mappings/">Mappings</a>
      <a href="/vendor-actions/">Vendor Queue</a>
      <a href="/mismatch/">Mismatch</a>
      <a href="/audit/">Audit</a>
    </nav>
  </header>
  <main>
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
