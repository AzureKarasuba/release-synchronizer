<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Release Synchronizer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap');

    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-2: #f7f7f7;
      --ink: #111111;
      --muted: #8a8a8a;
      --line: #e7e7e7;
      --line-strong: #dcdcdc;
      --black: #111111;
      --radius-lg: 14px;
      --radius-md: 10px;
      --shadow-flat: 0 2px 10px rgba(0, 0, 0, 0.04);
      --status-info: #2d6cdf;
      --status-warn: #c67f0f;
      --status-hold: #8a5adf;
      --status-ok: #2c9a67;
      --status-stop: #cf4f4f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Manrope", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    .site-shell {
      width: min(98vw, 1680px);
      margin: 10px auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      overflow: hidden;
    }

    header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 220px;
    }

    .brand-badge {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--black);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .brand-title {
      font-family: "Sora", "Manrope", sans-serif;
      font-size: clamp(18px, 1.8vw, 26px);
      line-height: 1;
      letter-spacing: -0.02em;
      color: #111;
    }

    .nav-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      justify-content: center;
      flex-wrap: wrap;
    }

    .nav-link {
      text-decoration: none;
      color: var(--muted);
      border: 1px solid var(--line);
      background: #fff;
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.14s ease;
    }

    .nav-link:hover {
      color: #222;
      border-color: var(--line-strong);
      background: #f9f9f9;
    }

    .nav-link.active {
      color: #111;
      border-color: #cfcfcf;
      background: #f1f1f1;
    }

    .auth {
      min-width: 140px;
      text-align: right;
    }

    main {
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 14px;
      box-shadow: var(--shadow-flat);
    }

    .card h2,
    .card h3 {
      margin: 0;
      letter-spacing: -0.01em;
      color: #111;
    }

    .card h2 {
      font-family: "Sora", "Manrope", sans-serif;
      font-size: clamp(21px, 2vw, 29px);
      margin-bottom: 8px;
    }

    .card h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .card p {
      margin: 0 0 8px 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: #555;
    }

    .chip.success { color: var(--status-ok); }
    .chip.warning { color: var(--status-warn); }
    .chip.danger { color: var(--status-stop); }

    .messages {
      display: grid;
      gap: 8px;
    }

    .message {
      background: #fbfbfb;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 11px;
      font-size: 12px;
      font-weight: 600;
      color: #333;
    }

    a.btn,
    button,
    .btn {
      appearance: none;
      border: 1px solid #111;
      background: #111;
      color: #fff;
      border-radius: 10px;
      padding: 8px 13px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.12s ease;
    }

    a.btn:hover,
    button:hover,
    .btn:hover {
      transform: translateY(-1px);
      background: #000;
    }

    .btn-ghost {
      background: #fff;
      color: #111;
      border-color: #d2d2d2;
    }

    .btn-ghost:hover {
      background: #f5f5f5;
    }

    input[type="date"],
    input[type="text"],
    textarea,
    select {
      border: 1px solid #dfdfdf;
      background: #fff;
      color: #111;
      border-radius: 8px;
      padding: 8px 9px;
      font-size: 12px;
      font-weight: 500;
      min-width: 120px;
    }

    input[type="date"]:focus,
    input[type="text"]:focus,
    textarea:focus,
    select:focus {
      outline: 2px solid rgba(17, 17, 17, 0.14);
      outline-offset: 1px;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #111;
      cursor: pointer;
    }

    a {
      color: #111;
      text-underline-offset: 2px;
    }

    .table-block {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 10px;
      overflow: auto;
      box-shadow: var(--shadow-flat);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    thead th {
      text-align: left;
      padding: 10px 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8a8a8a;
      font-weight: 700;
      border-bottom: 1px solid #e9e9e9;
      background: #fafafa;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody tr {
      background: #fff;
    }

    tbody tr.parent-row {
      background: #f2f2f2;
      font-weight: 700;
    }

    tbody td {
      padding: 10px 8px;
      border-bottom: 1px solid #efefef;
      font-size: 13px;
      vertical-align: middle;
    }

    .muted { color: var(--muted); }

    .feature-label {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid #dedede;
      background: #e9e9e9;
      color: #555;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.03em;
      margin-right: 8px;
    }

    .story-child-indent {
      padding-left: 30px;
      position: relative;
    }

    .story-child-indent::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 50%;
      width: 11px;
      border-top: 1px solid #cbcbcb;
      transform: translateY(-50%);
    }

    .release-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .release-code {
      font-size: 11px;
      font-weight: 700;
      color: #6f6f6f;
      border: 1px solid #e1e1e1;
      background: #f7f7f7;
      border-radius: 999px;
      padding: 4px 8px;
    }

    .mono {
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
    }

    @media (max-width: 900px) {
      .site-shell {
        width: 100%;
        margin: 0;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
      }

      header {
        padding: 12px;
      }

      .nav-wrap {
        justify-content: flex-start;
      }

      .auth {
        width: 100%;
        text-align: left;
      }

      main {
        padding: 10px;
      }

      table {
        min-width: 620px;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <header>
      <div class="brand">
        <span class="brand-badge">RS</span>
        <span class="brand-title">Release Synchronizer</span>
      </div>
      <nav class="nav-wrap">
        <a class="nav-link" href="/">Azure Mirror</a>
        <a class="nav-link" href="/manual/">Manual Plan</a>
        <a class="nav-link" href="/diff/">Diff View</a>
        <a class="nav-link" href="/status-report/">Status Report</a>
        <a class="nav-link" href="/audit/">Audit Log</a>
      </nav>
      <div class="auth">
        <button type="button" class="btn" onclick="alert('Login is under development for this demo version.');">Login</button>
      </div>
    </header>

    <main>
      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <div class="message">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    (function () {
      var path = window.location.pathname;
      var links = document.querySelectorAll('.nav-link');

      function isActive(href) {
        if (href === '/') {
          return path === '/' || path === '/mirror/';
        }
        return path.indexOf(href) === 0;
      }

      links.forEach(function (link) {
        var href = link.getAttribute('href');
        if (href && isActive(href)) {
          link.classList.add('active');
        }
      });
    })();
  </script>
</body>
</html>
