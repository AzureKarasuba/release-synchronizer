{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Cost Approval: {{ approval.release_item }}</h2>
  <p>Status: {{ approval.status }}</p>
  <p>Approver: {{ approval.approver }}</p>
  <p>Approval Date: {{ approval.approval_date }}</p>
  <p>Notes: {{ approval.notes }}</p>
</div>

<div class="card">
  <h3>Decision</h3>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Submit decision</button>
  </form>
</div>
{% endblock %}
